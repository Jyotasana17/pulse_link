<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Hub | Analytics Export</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --accent: #00ff00;
            --card: #111111;
            --text: #ffffff;
            --gray: #888888;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid #333;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card h2 { color: var(--accent); margin: 0; font-size: 2rem; }
        .stat-card p { color: var(--gray); margin: 5px 0 0; font-size: 0.9rem; }

        .analytics-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .analytics-table th {
            background: #1a1a1a;
            color: var(--accent);
            text-align: left;
            padding: 15px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .analytics-table td {
            padding: 15px;
            border-bottom: 1px solid #222;
        }

        .export-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .export-btn:hover {
            box-shadow: 0 0 15px var(--accent);
            transform: translateY(-2px);
        }

        .performance-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .high { background: rgba(0, 255, 0, 0.1); color: var(--accent); border: 1px solid var(--accent); }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <h1><i class="fas fa-chart-bar"></i> PERFORMANCE <span style="color: var(--accent)">REPORTS</span></h1>
        <button class="export-btn" onclick="exportToCSV()">
            <i class="fas fa-file-export"></i> EXPORT CSV
        </button>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <h2 id="totalVisits">1,284</h2>
            <p>Total Hub Visits</p>
        </div>
        <div class="stat-card">
            <h2 id="totalClicks">856</h2>
            <p>Total Link Clicks</p>
        </div>
        <div class="stat-card">
            <h2 id="avgCtr">66.7%</h2>
            <p>Avg. Engagement Rate</p>
        </div>
    </div>

    <table class="analytics-table" id="analyticsTable">
        <thead>
            <tr>
                <th>Link Title</th>
                <th>Target Region</th>
                <th>Clicks</th>
                <th>Performance</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <script>
        // structured data for link performance [cite: 39]
        const analyticsData = [
            { title: "Main Portfolio", region: "Global", clicks: 450, status: "High" },
            { title: "India Community", region: "IN", clicks: 280, status: "High" },
            { title: "US Client Portal", region: "US", clicks: 95, status: "Average" },
            { title: "GitHub Repo", region: "Global", clicks: 31, status: "Low" }
        ];

        function renderTable() {
            const body = document.getElementById('tableBody');
            body.innerHTML = analyticsData.map(row => `
                <tr>
                    <td>${row.title}</td>
                    <td>${row.region}</td>
                    <td>${row.clicks}</td>
                    <td><span class="performance-badge ${row.status.toLowerCase()}">${row.status}</span></td>
                </tr>
            `).join('');
        }

        // function to export data as CSV 
        function exportToCSV() {
            let csvContent = "data:text/csv;charset=utf-8,";
            csvContent += "Link Title,Region,Clicks,Performance\r\n";

            analyticsData.forEach(row => {
                csvContent += `${row.title},${row.region},${row.clicks},${row.status}\r\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "smart_hub_analytics_2026.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        renderTable();
    </script>
</body>
</html>
