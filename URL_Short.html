<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorten Hub | Advitiya Space Odyssey</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-black: #000000;
            --accent-green: #00FF00;
            --text-white: #FFFFFF;
            --dark-grey: #121212;
        }

        body {
            background-color: var(--primary-black);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 500px;
            padding: 2rem;
            border: 1px solid var(--accent-green);
            border-radius: 8px;
            background-color: var(--dark-grey);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }

        h1 {
            color: var(--accent-green);
            text-transform: uppercase;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            color: var(--accent-green);
        }

        input {
            width: 100%;
            padding: 12px;
            background: var(--primary-black);
            border: 1px solid #333;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: 'JetBrains Mono', monospace;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-green);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-green);
            color: var(--primary-black);
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #00cc00;
            box-shadow: 0 0 10px var(--accent-green);
        }

        #result-section {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px dashed #333;
            display: none;
        }

        .short-url-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #000;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #222;
        }

        .short-url-box span {
            color: var(--accent-green);
            font-family: 'JetBrains Mono', monospace;
            word-break: break-all;
        }

        .qr-placeholder {
            margin: 1.5rem auto;
            width: 150px;
            height: 150px;
            background: white; /* QR codes require white bg for contrast */
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            font-size: 0.7rem;
            border: 4px solid var(--accent-green);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Link Shortener</h1>
    
    <div class="input-group">
        <label for="longUrl">HUB PUBLIC URL</label>
        <input type="url" id="longUrl" placeholder="https://hub.advitiya.in/user/portfolio" required>
    </div>

    <div class="input-group">
        <label for="alias">CUSTOM ALIAS (OPTIONAL)</label>
        <input type="text" id="alias" placeholder="e.g. my-links">
    </div>

    <button onclick="generateShortLink()">Generate Short Link</button>

    <div id="result-section">
        <label>YOUR SMART LINK</label>
        <div class="short-url-box">
            <span id="shortenedUrl">advit.ia/xyz123</span>
        </div>
        
        <label style="margin-top: 1.5rem;">QR CODE GENERATED</label>
        <div class="qr-placeholder" id="qrCode">
            [QR CODE]
        </div>
    </div>
</div>

<script>
    function generateShortLink() {
        const longUrl = document.getElementById('longUrl').value;
        const alias = document.getElementById('alias').value;
        const resultSection = document.getElementById('result-section');
        const shortenedUrlText = document.getElementById('shortenedUrl');

        if (!longUrl) {
            alert("Please enter a valid URL");
            return;
        }

        // Logic for mock shortening (Backend implementation required for persistence)
        const slug = alias || Math.random().toString(36).substring(7);
        const finalUrl = `advit.ia/${slug}`;

        // Display results
        shortenedUrlText.innerText = finalUrl;
        resultSection.style.display = 'block';

        // Scroll to result
        resultSection.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
