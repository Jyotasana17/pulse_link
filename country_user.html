<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Link Hub | Active Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #000000;
            --accent-green: #00ff00;
            --card-bg: #111111;
            --border-color: #333333;
            --text-gray: #cccccc;
        }

        body {
            background-color: var(--primary-bg);
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding-bottom: 50px;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid var(--accent-green);
            margin-bottom: 30px;
        }

        .location-status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #1a1a1a;
            border: 1px solid var(--accent-green);
            padding: 8px 16px;
            border-radius: 30px;
            color: var(--accent-green);
            font-size: 14px;
            margin-top: 20px;
        }

        .links-container {
            display: grid;
            gap: 15px;
        }

        .link-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            text-decoration: none; /* Make entire card clickable */
            color: inherit;
        }

        .link-card:hover {
            border-color: var(--accent-green);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.1);
        }

        .link-card.targeted {
            border-left: 5px solid var(--accent-green);
            background: #0a140a;
        }

        .link-info h3 { margin: 0; color: var(--accent-green); display: flex; align-items: center; gap: 10px; }
        .link-info p { margin: 5px 0 0; color: var(--text-gray); font-size: 14px; }
        
        .target-label {
            font-size: 10px;
            background: var(--accent-green);
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .visit-icon {
            color: var(--accent-green);
            font-size: 20px;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .link-card:hover .visit-icon {
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="letter-spacing: 2px;">ADVITIYA <span style="color: var(--accent-green);">SMART HUB</span></h1>
        <div id="locationBadge" class="location-status">
            <i class="fas fa-circle-notch fa-spin"></i> Initializing Geo-Rules...
        </div>
    </header>

    <div id="linksWrapper" class="links-container">
        </div>
</div>

<script>
    // 1. DATA MODEL WITH ACTIVE URLS
    // These would typically come from your Backend API [cite: 44]
    const allLinks = [
        { 
            id: 1, 
            title: "Main Portfolio", 
            url: "https://yourportfolio.com", 
            desc: "Global showcase of all projects", 
            country: "all", 
            icon: "fa-briefcase" 
        },
        { 
            id: 2, 
            title: "India Tech Community", 
            url: "https://t.me/indiatech", 
            desc: "Join our local developer group in India", 
            country: "IN", 
            icon: "fa-users" 
        },
        { 
            id: 3, 
            title: "US Client Portal", 
            url: "https://us-portal.service.com", 
            desc: "Exclusive access for North American partners", 
            country: "US", 
            icon: "fa-lock" 
        },
        { 
            id: 4, 
            title: "GitHub Repository", 
            url: "https://github.com/your-repo", 
            desc: "Open source code and documentation", 
            country: "all", 
            icon: "fa-code-branch" 
        }
    ];

    // 2. LOGIC: GEOLOCATION & RULE EVALUATION [cite: 32, 76]
    async function initSmartHub() {
        const badge = document.getElementById('locationBadge');
        const container = document.getElementById('linksWrapper');

        try {
            // Detect User Location
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            const userCountry = data.country_code;

            badge.innerHTML = `<i class="fas fa-map-marker-alt"></i> Region Detected: ${data.country_name}`;

            // Rule Engine: Sort links so country-specific ones are prioritized [cite: 29]
            const sortedLinks = [...allLinks].sort((a, b) => {
                if (a.country === userCountry) return -1;
                if (b.country === userCountry) return 1;
                return 0;
            });

            renderLinks(sortedLinks, userCountry);

        } catch (error) {
            badge.innerHTML = `<i class="fas fa-globe"></i> Global Mode Active`;
            renderLinks(allLinks, 'none');
        }
    }

    // 3. UI RENDERING
    function renderLinks(links, userCountry) {
        const container = document.getElementById('linksWrapper');
        container.innerHTML = '';

        links.forEach(link => {
            const isTargeted = link.country === userCountry;
            
            // Create a clickable anchor tag
            const card = document.createElement('a');
            card.href = link.url;
            card.target = "_blank"; // Opens in new tab
            card.className = `link-card ${isTargeted ? 'targeted' : ''}`;
            
            // Add click tracking logic here for Analytics Requirements 
            card.onclick = () => {
                console.log(`Tracking click for Link ID: ${link.id}`);
                // In a real app, you would fetch() your analytics API here
            };

            card.innerHTML = `
                <div class="link-info">
                    <h3>
                        <i class="fas ${link.icon}"></i> 
                        ${link.title}
                        ${isTargeted ? '<span class="target-label">LOCAL PRIORITY</span>' : ''}
                    </h3>
                    <p>${link.desc}</p>
                </div>
                <div class="visit-icon">
                    <i class="fas fa-external-link-alt"></i>
                </div>
            `;
            container.appendChild(card);
        });
    }

    initSmartHub();
</script>

</body>
</html>
